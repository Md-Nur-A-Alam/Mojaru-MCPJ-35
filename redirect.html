<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mojaru Olympiad — লোড হচ্ছে…</title>
  <meta http-equiv="refresh" content="3;url=index.html" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      height: 100vh;
      display: flex; justify-content: center; align-items: center;
      background: linear-gradient(135deg, #0f172a 0%, #0f2044 50%, #0c3a3a 100%);
      color: white; overflow: hidden;
      font-family: 'Noto Serif Bengali', 'SolaimanLipi', Georgia, serif;
    }

    /* soft radial glow */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at 60% 40%, rgba(91,63,214,0.18) 0%, transparent 65%),
                  radial-gradient(ellipse at 30% 70%, rgba(14,124,123,0.15) 0%, transparent 55%);
      pointer-events: none;
    }

    .container {
      text-align: center;
      background: rgba(255,255,255,0.07);
      padding: 3rem 2.5rem;
      border-radius: 20px;
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      width: 90%; max-width: 480px;
      animation: fadeIn 0.8s ease both;
    }

    .logo-wrap { font-size: 3.5rem; margin-bottom: 1rem; }

    .brand {
      font-size: 1.8rem; font-weight: 800;
      margin-bottom: 0.4rem; letter-spacing: -0.01em;
    }
    .brand span { color: #38bdf8; }

    .tagline {
      font-size: 0.9rem; color: rgba(255,255,255,0.55);
      margin-bottom: 0.3rem; letter-spacing: 0.04em;
    }

    .divider {
      width: 48px; height: 3px;
      background: linear-gradient(90deg, #5b3fd6, #38bdf8);
      border-radius: 2px; margin: 1.25rem auto;
    }

    p {
      font-size: 0.92rem; color: rgba(255,255,255,0.65);
      line-height: 1.7; margin-bottom: 1.75rem;
    }

    /* ── Animated loader dots ─ */
    .dots {
      display: flex; justify-content: center; gap: 0.5rem; margin-bottom: 1.5rem;
    }
    .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #38bdf8; animation: bounce 1.2s infinite ease-in-out;
    }
    .dot:nth-child(1) { animation-delay: 0s;    background: #38bdf8; }
    .dot:nth-child(2) { animation-delay: 0.2s;  background: #a78bfa; }
    .dot:nth-child(3) { animation-delay: 0.4s;  background: #6ee7b7; }

    .redirect-link {
      display: inline-block; margin-top: 0.5rem;
      text-decoration: none; color: #38bdf8;
      font-weight: 700; font-size: 0.88rem;
      border-bottom: 1px solid rgba(56,189,248,0.35);
      transition: color 0.2s, border-color 0.2s;
    }
    .redirect-link:hover { color: #7dd3fc; border-color: #7dd3fc; }

    /* exam preview pills */
    .exam-pills {
      display: flex; flex-wrap: wrap; justify-content: center;
      gap: 0.5rem; margin-bottom: 1.5rem;
    }
    .epill {
      font-size: 0.73rem; font-weight: 700;
      border-radius: 8px; padding: 0.3rem 0.75rem;
      border: 1px solid;
    }
    .epill.teal   { background: rgba(14,124,123,0.15); color: #6ee7b7; border-color: rgba(14,124,123,0.3); }
    .epill.violet { background: rgba(91,63,214,0.15);  color: #a78bfa; border-color: rgba(91,63,214,0.3); }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
      40%           { transform: scale(1.1); opacity: 1; }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-wrap">📐</div>
    <div class="brand">Mojaru <span>Olympiad</span></div>
    <div class="tagline">গণিত অলিম্পিয়াড প্রস্তুতি · জুনিয়র স্তর</div>
    <div class="divider"></div>

    <div class="exam-pills">
      <span class="epill teal">Test 01 · গড় ও বিভাজ্যতা</span>
      <span class="epill violet">Test 02 · ধারা (AP &amp; GP)</span>
    </div>

    <p>পোর্টালে স্বাগতম! তোমাকে পরীক্ষা নির্বাচন পাতায় নিয়ে যাওয়া হচ্ছে…</p>

    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

    <a href="index.html" class="redirect-link">
      স্বয়ংক্রিয় না গেলে এখানে ক্লিক করো →
    </a>
  </div>
</body>
</html>
